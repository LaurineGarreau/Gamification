<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crée ton avatar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1c1c2e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Wrapper prend la taille après scale ── */
    .iphone-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── iPhone 16 shell ── */
    .iphone {
      width: 393px;
      height: 852px;
      transform-origin: center center;
      flex-shrink: 0;
      background: #f4ebe3;
      border-radius: 56px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px #3a3a3a,
        0 0 0 3.5px #1a1a1a,
        0 0 0 5px #2e2e2e,
        0 60px 140px rgba(0,0,0,0.75),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    /* ── Status bar ── */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      padding: 14px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
    }

    .status-time {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Screen ── */
    .screen {
      width: 100%;
      height: 100%;
      padding: 58px 22px 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Progress dots */
    .progress {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
    }

    .dot {
      height: 8px;
      border-radius: 4px;
      background: #d8cfc9;
    }
    .dot.active {
      width: 32px;
      background: #e5197e;
    }
    .dot:not(.active) { width: 8px; }

    .step-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      color: #e5197e;
      text-transform: uppercase;
      margin-bottom: 38px;
    }

    /* Title */
    .title {
      font-size: 31px;
      font-weight: 800;
      color: #111;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: -0.4px;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 400;
      color: #9a8f8a;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 30px;
      max-width: 250px;
    }

    /* ── Option cards ── */
    .options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .option {
      background: #fff;
      border-radius: 22px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color 0.18s ease;
      box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    }

    .option.selected { border-color: #e5197e; }

    /* Avatar wrapper — sprite sheet avatar.png (3×3 grid) */
    .av {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      background-image: url('avatar.png');
      background-size: 300% 300%;
      background-repeat: no-repeat;
    }
    /* Homme : ligne 0, colonne 0 — cheveux bruns épars */
    .av-homme { background-position: 0% 0%; }
    /* Femme  : ligne 0, colonne 2 — chignon orange */
    .av-femme  { background-position: 100% 0%; }
    /* Neutre : ligne 1, colonne 1 — cheveux très sombres */
    .av-neutre { background-position: 50% 50%; }

    .option-label {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      flex: 1;
    }

    /* Radio */
    .radio {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      border: 2px solid #c8bfba;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .option.selected .radio {
      background: #e5197e;
      border-color: #e5197e;
    }
    .radio svg { display: none; }
    .option.selected .radio svg { display: block; }

    /* ── Button ── */
    .btn-wrap {
      width: 100%;
      margin-top: auto;
      padding-top: 20px;
    }

    .btn-next {
      width: 100%;
      height: 60px;
      background: #e5197e;
      border: none;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(229, 25, 126, 0.38);
    }
    .btn-next span {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    /* Home bar */
    .home-bar {
      position: absolute;
      bottom: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 5px;
      background: rgba(0,0,0,0.22);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<div class="iphone-wrap">
<div class="iphone">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <!-- Réseau (barres signal) -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0"  y="8"  width="3" height="4"  rx="1" fill="#111"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#111"/>
        <rect x="9"  y="3"  width="3" height="9"  rx="1" fill="#111"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111"/>
      </svg>
      <!-- Wi-Fi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="#111"/>
        <path d="M3.5 6.5C4.9 5.1 6.35 4.4 8 4.4s3.1.7 4.5 2.1" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M1 4C3 2 5.4 1 8 1s5 1 7 3" stroke="#111" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- Batterie -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111" stroke-width="1.1"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#111"/>
        <path d="M23 4v4" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="screen">

    <!-- Progress -->
    <div class="progress">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="step-label">Étape 1 sur 3</p>

    <h1 class="title">Crée ton avatar</h1>
    <p class="subtitle">Personnalise ton profil au sein de ta collocation</p>

    <div class="options">

      <!-- ── HOMME ── -->
      <div class="option" onclick="pick(this)">
        <div class="av av-homme"></div>
        <span class="option-label">Homme</span>
        <div class="radio">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7l4 4 6-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- ── FEMME (sélectionnée) ── -->
      <div class="option selected" onclick="pick(this)">
        <div class="av av-femme"></div>
        <span class="option-label">Femme</span>
        <div class="radio">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7l4 4 6-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- ── NEUTRE ── -->
      <div class="option" onclick="pick(this)">
        <div class="av av-neutre"></div>
        <span class="option-label">Neutre</span>
        <div class="radio">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7l4 4 6-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

    </div><!-- /options -->

    <!-- Button -->
    <div class="btn-wrap">
      <button class="btn-next">
        <span>Suivant</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

  </div><!-- /screen -->

  <div class="home-bar"></div>
</div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  function pick(el) {
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  const IPHONE_W = 393;
  const IPHONE_H = 852;

  function fitScreen() {
    const pad = 24;
    const scale = Math.min(
      (window.innerHeight - pad * 2) / IPHONE_H,
      (window.innerWidth  - pad * 2) / IPHONE_W,
      1
    );
    const wrap   = document.querySelector('.iphone-wrap');
    const iphone = document.querySelector('.iphone');
    iphone.style.transform = `scale(${scale})`;
    wrap.style.width  = (IPHONE_W * scale) + 'px';
    wrap.style.height = (IPHONE_H * scale) + 'px';
  }

  fitScreen();
  window.addEventListener('resize', fitScreen);
</script>
</body>
</html>
